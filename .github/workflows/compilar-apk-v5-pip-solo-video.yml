name: Compilar APK MasterPlus v5 PiP Solo Video

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Descomprimir proyecto v5
        run: |
          unzip MasterPlus_Android_v5_PiP_SoloVideo_Proyecto.zip
          cp -r MasterPlus_Android_v5_PiP_SoloVideo/* .
          cp -r MasterPlus_Android_v5_PiP_SoloVideo/.github . 2>/dev/null || true

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Compilar APK
        run: gradle assembleDebug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPlus-v5-PiP-SoloVideo-APK
          path: app/build/outputs/apk/debug/app-debug.apk
